name: weather
description: "A new Flutter project."

publish_to: 'none'


version: 1.0.0+1

environment:
  sdk: ^3.12.2


dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management & DI
  flutter_bloc: ^8.1.3
  get_it: ^7.6.0
  injectable: ^2.4.2
  equatable: ^2.0.5

  # Networking & Local DB
  dio: ^5.4.3
  hive_flutter: ^1.1.0
  connectivity_plus: ^6.0.3

  # Functional Programming & Utils
  dartz: ^0.10.1
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # Code Generation
  build_runner: ^2.4.9
  injectable_generator: ^2.6.1
  hive_generator: ^2.0.1

  # Testing
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
